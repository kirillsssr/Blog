{% load static %}
<link rel="stylesheet" href="{% static 'css/article.css' %}">
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Django Public Blog — вход</title>
</head>
<body class="login">
<div class="header">
    <div class="archive-header-links">
        <a class="registration" href="{% url 'registration' %}">
            Регистрация
        </a>
    </div>
</div>
<div class="content">
    <h1>Вход</h1>
    <form method="POST">
        {% csrf_token %}
        <label>
            <input type="text" name="username" placeholder="Имя пользователя">
        </label>
        <label>
            <input type="password" name="password" placeholder="Пароль">
        </label>
        <input type="submit" value="Войти">
    </form>
    {{ form.errors }}
</div>
</body>
</html>
